<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zendesk JWT Auth Demo</title>
    <link rel="stylesheet" href="/css/radix-theme.css">
</head>
<body class="setup-page">
    <div class="setup-card animate-in">
        <div class="setup-logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="60" height="60">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="var(--primary-bg)"/>
                <path d="M2 17L12 22L22 17" stroke="var(--primary-bg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="var(--primary-bg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <h1 class="setup-title">Welcome Back</h1>
        <p class="setup-subtitle">Sign in to access the Zendesk messaging widget</p>

        <div id="errorMessage" class="callout callout-error" style="display:none;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input
                    class="form-field"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="you@example.com"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    class="form-field"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" id="loginButton" class="btn btn-primary btn-block btn-lg">
                Sign In
            </button>
        </form>

        <div class="callout callout-info" style="margin-top: var(--space-5);">
            <strong>Demo Credentials:</strong><br>
            Email: <code>user@example.com</code><br>
            Password: <code>password123</code>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
