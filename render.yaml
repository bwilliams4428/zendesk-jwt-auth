# Render Configuration for Zendesk JWT Auth
#
# This app does NOT use environment variables for credentials.
# Configuration is done through the web UI — credentials are stored
# in server-side sessions (ephemeral) or config.json (persisted).
# They are never hardcoded or set as env vars.

services:
  - type: web
    name: zendesk-jwt-auth
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromParam: PORT